name: dropcrate

services:
  seaweedfs:
    image: chrislusf/seaweedfs:4.17
    command:
      - server
      - -dir=/data
      - -ip.bind=0.0.0.0
      - -master.port=9333
      - -volume.port=8080
      - -filer=true
      - -filer.port=8888
      - -s3=true
      - -s3.port=8333
    ports:
      - "9333:9333"
      - "8080:8080"
      - "8888:8888"
      - "8333:8333"
    volumes:
      - ./seaweedfs-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9333/cluster/status"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dropcrate
      POSTGRES_USER: dropcrate
      POSTGRES_PASSWORD: dropcrate
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dropcrate -d dropcrate"]
